# Lorenz96 Config

train:
  epochs: 500
  batch_size: 32
  lr: 1.0e-3
  itr_per_epoch: 100

diffusion:
  layers: 4
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.5
  num_steps: 50
  schedule: "quad"
  is_linear: false

model:
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  target_strategy: "mix"
  time_steps: 100
  forcing: 8
  N: 100